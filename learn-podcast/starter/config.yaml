# Learn Podcast — generated by the learn-podcast skill.
# Re-run the skill to regenerate, or edit by hand. Every field is documented.

# ── Who's learning ──────────────────────────────────────────────────────────
learner:
  topic: "{{TOPIC}}"
  level: "{{LEVEL}}"
  goal:  "{{GOAL}}"

# ── Episode shape ───────────────────────────────────────────────────────────
episode_minutes: {{EPISODE_MINUTES}}
target_sources_per_episode: 5
voice: "{{VOICE}}"

# ── Discovery window ────────────────────────────────────────────────────────
lookback_days: {{LOOKBACK_DAYS}}
max_per_source: 3

# ── Coverage + verification gates ───────────────────────────────────────────
# A planned lesson is postponed if fewer than this many sources cover it.
min_sources_per_lesson: 2
# Verification pass: claim-by-claim grounding check. Drift paragraphs are
# rewritten in-place. `verify_strict: true` rejects the whole episode if the
# fraction of SUPPORTED claims falls below `min_supported_fraction`.
verify_strict: {{VERIFY_STRICT}}
min_supported_fraction: 0.7

# ── LLM provider ────────────────────────────────────────────────────────────
llm:
  provider: "{{LLM_PROVIDER}}"
  # model: claude-sonnet-4-6   # optional per-provider override

# ── Sources (the moat) ──────────────────────────────────────────────────────
# Each source: name, url, kind, resolver?, filter?
#
# resolver options:
#   rss               (default) plain feedparser
#   rss_app           wrap a Webflow / JS-rendered / paywalled site through rss.app
#   apify_linkedin    pull a person's LinkedIn posts (needs APIFY_TOKEN)
#   podchaser_person  track a named person's podcast guest appearances (needs PODCHASER_TOKEN)
#
# filter options (all combine with AND):
#   author: "Name"             match feed entry author field
#   keyword_any: [..., ...]    at least one in title or body
#   keyword_all: [..., ...]    every keyword present
#   min_words: 300             drop short posts
#   published_after: "2026-01-01"
sources:
{{SOURCES_YAML}}

# ── Delivery ────────────────────────────────────────────────────────────────
delivery:
  ntfy_topic: "{{NTFY_TOPIC}}"
  podcast_feed: {{PODCAST_FEED}}
  s3:
    bucket:     "{{S3_BUCKET}}"
    endpoint:   "{{S3_ENDPOINT}}"
    public_url: "{{S3_PUBLIC_URL}}"

# ── Feed metadata (only used when delivery.podcast_feed: true) ──────────────
feed:
  title:          "{{FEED_TITLE}}"
  description:    "{{FEED_DESCRIPTION}}"
  author:         "{{FEED_AUTHOR}}"
  email:          "{{FEED_EMAIL}}"
  language:       "en-us"
  category:       "Education"
  subcategory:    "How To"
  feed_filename:  "feed.xml"
  episode_prefix: "episode"
  cover_image:    "cover.png"
